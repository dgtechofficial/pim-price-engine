<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIM Engine</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./assets/style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        .tab-active {
            background: #4f46e5 !important;
            color: white;
        }

        .modifier-row {
            background: #0b1220;
        }
    </style>
</head>

<body class="bg-slate-950 text-slate-100">
    <div class="app-shell flex min-h-screen">
        <aside class="sidebar hidden xl:flex flex-col">
            <div class="sidebar-brand">
                <a href="./index.html" class="flex items-center gap-3">
                    <span class="brand-mark text-base">P</span>
                    <div>
                        <p class="text-[10px] uppercase tracking-[0.35em] text-slate-500">PIM SaaS</p>
                        <h2 class="text-lg font-bold text-white">Modifier Studio</h2>
                    </div>
                </a>
            </div>
            <nav class="sidebar-nav flex-1">
                <a href="../index.html" class="sidebar-link">
                    <i class="fa-solid fa-bolt"></i>
                    <span>Price Engine</span>
                </a>
                <a href="./modifier.html" class="sidebar-link sidebar-link-active">
                    <i class="fa-solid fa-sliders"></i>
                    <span>Modifier Studio</span>
                </a>
                <a href="../product_mapping/index.html" class="sidebar-link">
                    <i class="fa-solid fa-sitemap"></i>
                    <span>Product Mapping</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="font-semibold text-slate-300 mb-2">Workspace</div>
                Static PIM suite served by Express.
            </div>
        </aside>

        <div class="flex-1">
            <main class="main-content p-2">

                <div class="p-2">

                    <!-- FILES -->
                    <div class="grid grid-cols-3 gap-3 mb-3">
                        <input type="file" id="file1" class="bg-slate-900 border border-slate-700 p-2 rounded">
                        <input type="file" id="file2" class="bg-slate-900 border border-slate-700 p-2 rounded">
                        <input type="file" id="file3" class="bg-slate-900 border border-slate-700 p-2 rounded">
                    </div>

                    <button onclick="buildEngine()" class="bg-emerald-600 px-4 py-2 rounded text-sm font-bold">
                        Build Engine
                    </button>

                    <!-- SEARCH -->
                    <!-- <input id="search"
        class="w-full mt-3 p-2 bg-slate-900 border border-slate-700 rounded"
        placeholder="Search everything..."> -->

                    <!-- TABS -->
                    <div class="flex gap-2 mt-3 text-xs border-b border-slate-800 pb-2">

                        <button onclick="switchTab('categories', this)" class="tab tab-active px-3 py-1 rounded">
                            Categories
                        </button>

                        <button onclick="switchTab('productModifiers', this)"
                            class="tab bg-slate-800 px-3 py-1 rounded">
                            Product Modifiers
                        </button>

                        <button onclick="switchTab('modifierContents', this)"
                            class="tab bg-slate-800 px-3 py-1 rounded">
                            Modifier Contents
                        </button>

                        <button onclick="switchTab('health', this)" class="tab bg-slate-800 px-3 py-1 rounded">
                            Health
                        </button>

                    </div>

                    <!-- VIEWS -->
                    <div id="view-categories" class="mt-4"></div>
                    <div id="view-productModifiers" class="mt-4 hidden"></div>
                    <div id="view-modifierContents" class="mt-4 hidden"></div>
                    <div id="view-health" class="mt-4 hidden"></div>

                </div>
        </div>
        </main>
    </div>
    </div>

    <!-- MODAL -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">

        <div class="bg-slate-900 w-[95%] max-w-5xl rounded border border-slate-800">

            <div class="flex justify-between p-4 border-b border-slate-800">
                <h2 id="modalTitle" class="text-indigo-400 font-bold"></h2>
                <button onclick="closeModal()">✕</button>
            </div>

            <div class="p-4 max-h-[70vh] overflow-auto">
                <table class="w-full text-xs">
                    <thead class="text-slate-400 border-b border-slate-700">
                        <tr>
                            <th class="text-left p-2">ID</th>
                            <th class="text-left p-2">Name</th>
                            <th class="text-left p-2">SKU</th>
                            <th class="text-left p-2">Action</th>
                        </tr>
                    </thead>
                    <tbody id="modalBody"></tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="./assets/modifier.js"></script>

</body>

</html>
