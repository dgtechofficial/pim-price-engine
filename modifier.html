<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIM Engine</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
    .tab-active {
        background: #4f46e5 !important;
        color: white;
    }

    .modifier-row {
        background: #0b1220;
    }
</style>
</head>

<body class="bg-slate-950 text-slate-100">

<!-- HEADER -->
<div class="border-b border-slate-800 bg-slate-950 sticky top-0 z-10">
    <div class= p-4 flex justify-between">
        <h1 class="font-bold text-indigo-400">PIM Relationship Engine</h1>
        <div class="text-xs text-slate-500">Categories → Products → Modifiers → Contents</div>
    </div>
</div>

<div class="p-4">

    <!-- FILES -->
    <div class="grid grid-cols-3 gap-3 mb-3">
        <input type="file" id="file1" class="bg-slate-900 border border-slate-700 p-2 rounded">
        <input type="file" id="file2" class="bg-slate-900 border border-slate-700 p-2 rounded">
        <input type="file" id="file3" class="bg-slate-900 border border-slate-700 p-2 rounded">
    </div>

    <button onclick="buildEngine()"
        class="bg-emerald-600 px-4 py-2 rounded text-sm font-bold">
        Build Engine
    </button>

    <!-- SEARCH -->
    <!-- <input id="search"
        class="w-full mt-3 p-2 bg-slate-900 border border-slate-700 rounded"
        placeholder="Search everything..."> -->

    <!-- TABS -->
    <div class="flex gap-2 mt-3 text-xs border-b border-slate-800 pb-2">

        <button onclick="switchTab('categories', this)" class="tab tab-active px-3 py-1 rounded">
            Categories
        </button>

        <button onclick="switchTab('productModifiers', this)" class="tab bg-slate-800 px-3 py-1 rounded">
            Product Modifiers
        </button>

        <button onclick="switchTab('modifierContents', this)" class="tab bg-slate-800 px-3 py-1 rounded">
            Modifier Contents
        </button>

        <button onclick="switchTab('health', this)" class="tab bg-slate-800 px-3 py-1 rounded">
            Health
        </button>

    </div>

    <!-- VIEWS -->
    <div id="view-categories" class="mt-4"></div>
    <div id="view-productModifiers" class="mt-4 hidden"></div>
    <div id="view-modifierContents" class="mt-4 hidden"></div>
    <div id="view-health" class="mt-4 hidden"></div>

</div>

<!-- MODAL -->
<div id="modal"
    class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">

    <div class="bg-slate-900 w-[95%] max-w-5xl rounded border border-slate-800">

        <div class="flex justify-between p-4 border-b border-slate-800">
            <h2 id="modalTitle" class="text-indigo-400 font-bold"></h2>
            <button onclick="closeModal()">✕</button>
        </div>

        <div class="p-4 max-h-[70vh] overflow-auto">
            <table class="w-full text-xs">
                <thead class="text-slate-400 border-b border-slate-700">
                    <tr>
                        <th class="text-left p-2">ID</th>
                        <th class="text-left p-2">Name</th>
                        <th class="text-left p-2">SKU</th>
                        <th class="text-left p-2">Action</th>
                    </tr>
                </thead>
                <tbody id="modalBody"></tbody>
            </table>
        </div>

    </div>
</div>

<script src="./assets/modifier.js"></script>

</body>
</html>
